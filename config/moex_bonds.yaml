source:
  url: "https://iss.moex.com/iss/apps/infogrid/emission/rates.csv?sec_type=stock_ofz_bond,stock_cb_bond,stock_subfederal_bond,stock_municipal_bond,stock_corporate_bond,stock_exchange_bond&iss.dp=comma&iss.df=%25d.%25m.%25Y&iss.tf=%25H:%25M:%25S&iss.dtf=%25d.%25m.%25Y%20%25H:%25M:%25S&iss.only=rates&limit=unlimited&lang=ru"

network:
  timeout_sec: 60

output:
  excel_path: "Moex_Bonds.xlsx"
  sheet_name: "MOEX_BONDS"
  # Полный список колонок, которые всегда удаляются как служебный мусор
  drop_columns:
    - "TYPENAME"
    - "REGNUMBER"
    - "LISTLEVEL"
    - "IS_COLLATERAL"
    - "IS_EXTERNAL"
    - "PRIMARY_BOARDID"
    - "PRIMARY_BOARD_TITLE"
    - "IS_RII"
    - "INCLUDEDBYMOEX"
    - "EVENINGSESSION"
    - "MORNINGSESSION"
    - "WEEKENDSESSION"
    - "SUSPENSION_LISTING"
    - "ZSPREAD"
    - "COUPONDAYSPASSED"
    - "COUPONDAYSREMAIN"
    - "COUPONLENGTH"
    - "INITIALFACEVALUE"
    - "STARTDATEMOEX"
    - "REPLBOND"
    - "DAYSTOREDEMPTION"
    - "LOTSIZE"
    - "RTL1"
    - "RTH1"
    - "RTL2"
    - "RTH2"
    - "RTL3"
    - "RTH3"
    - "DISCOUNT1"
    - "LIMIT1"
    - "DISCOUNT2"
    - "LIMIT2"
    - "DISCOUNT3"
    - "DISCOUNTL0"
    - "DISCOUNTH0"
    - "FULLCOVERED"
    - "FULL_COVERED_LIMIT"
    - "DURATION"
    - "NAME"
    - "OFFERDATE"
    - "YIELDATWAP"
    - "MATDATE"
  # Цветовая шкала применяется только к точным именам колонок (без масок)
  heatmap_columns: ["YIELD", "EFFECTIVEYIELD", "COUPON", "SPREAD"]
  # Колонки, которые принудительно остаются текстом
  text_columns: ["INN"]
  # Колонки, которые переносятся в конец таблицы
  move_to_end_columns: ["WAPRICE"]

logging:
  path: "logs/Moex_Bonds.log"

pipeline:
  logging:
    path: "logs/main.log"

sorter:
  input:
    excel_path: "Moex_Bonds.xlsx"
    sheet_name: "MOEX_BONDS"
  output:
    # Итог после сортировки перезаписывает основной файл
    excel_path: "Moex_Bonds.xlsx"
    sheet_name: "MOEX_BONDS"
    dropped_path: "DropedBonds.csv"
    dropped_encoding: "utf-8-sig"
  logging:
    path: "logs/Python_Sorter.log"
  cache:
    state_path: "logs/cache/sorter_state.json"
  performance:
    skip_rebuild_if_unchanged: true
  filters:
    - name: "exclude_structured_bonds"
      enabled: true
      column: "BOND_TYPE"
      equals: "Структурная облигация"
      reason: "BOND_TYPE = Структурная облигация"
      permanent: true
    - name: "exclude_qualified_only"
      enabled: true
      column: "IS_QUALIFIED_INVESTORS"
      equals: "1"
      reason: "IS_QUALIFIED_INVESTORS = 1"
      ttl_days: 30

cache:
  csv_path: "logs/cache/moex_rates.csv"
  state_path: "logs/cache/moex_rates_state.json"
  ttl_sec: 3600

performance:
  width_sample_rows: 250
  # Если исходные данные не изменились, Excel не пересобирается (самый быстрый повторный запуск)
  skip_rebuild_if_unchanged: true
