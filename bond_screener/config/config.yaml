excel_debug: true
excel_debug_exports: [stage2, stage3]

paths:
  logs_dir: logs
  db_dir: db
  cache_http_dir: cache/http
  cache_checkpoints_dir: cache/checkpoints
  source_xlsx_dir: source/xlsx
  source_parquet_dir: source/parquet

net:
  concurrency: 20
  timeout:
    connect_s: 10
    read_s: 30
    write_s: 30
    pool_s: 30
  retry:
    max_attempts: 5
    backoff_initial_s: 0.5
    backoff_max_s: 10
    jitter_s: 0.5
  cache_ttl_s_default: 3600

stage1:
  ttl_hours: 24
  emitents_page_size: 100
  emitents_max_pages: 1000

db:
  filename: db/bonds.db

stage2:
  dropped_ui_filename: Dropped_bonds.xlsx

stage3:
  enabled: true
  run_sources_in_parallel: true
  ttl_hours: 6
  batch_size: 200
  moex:
    enabled: true
    ttl_hours: 6
    concurrency: 20
    progressbar_position: 0
    engine: "stock"
    market: "bonds"
    boards: []
    page_size: 100
    bondization:
      enabled: true
      include_offers: true
      from: ""
      till: ""
  dohod:
    enabled: true
    ttl_hours: 6
    concurrency: 5
    progressbar_position: 1
    min_delay_s: 0.3
    page_timeout_s: 30
    base_url: "https://analytics.dohod.ru/bond/{isin}"
    user_agent: "Mozilla/5.0 (compatible; bond_screener/1.0)"
    use_playwright: false
